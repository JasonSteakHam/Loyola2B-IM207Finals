{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width: 500px;">
    <h1>Edit Profile</h1>
    
    <form method="POST">
      <div class="form-group">
        <label>Full Name:</label>
        <input type="text" name="name" value="{{ user.name }}" required minlength="2" maxlength="100">
      </div>
      
      <div class="form-group">
        <label>Email:</label>
        <input type="email" value="{{ user.email }}" disabled readonly class="readonly-field">
        <small class="input-hint">Email cannot be changed</small>
      </div>
      
      <div class="form-group">
        <label>Phone Number:</label>
        <input type="tel" name="phone" value="{{ user.phone or '' }}" placeholder="e.g., 09123456789">
      </div>
      
      <div class="form-group">
        <label>Address:</label>
        <textarea name="address" rows="3" placeholder="Your complete address">{{ user.address or '' }}</textarea>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="auth-btn">Save Changes</button>
        <a href="{{ url_for('profile') }}" class="auth-btn" style="background: #6c757d; text-align: center; text-decoration: none;">Cancel</a>
      </div>
    </form>
  </div>
</div>

<style>
  .auth-page {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  }
  
  .auth-card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    width: 100%;
  }
  
  .auth-card h1 {
    color: #0056a6;
    margin-bottom: 30px;
    text-align: center;
  }
  
  .form-group {
    margin-bottom: 20px;
  }
  
  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
  }
  
  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    transition: border-color 0.3s;
  }
  
  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #0056a6;
  }
  
  .readonly-field {
    background: #f5f5f5;
    cursor: not-allowed;
  }
  
  .input-hint {
    display: block;
    font-size: 12px;
    color: #666;
    margin-top: 5px;
  }
  
  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 30px;
  }
  
  .auth-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }
  
  .auth-btn[type="submit"] {
    background: #0056a6;
    color: white;
  }
  
  .auth-btn[type="submit"]:hover {
    background: #003d7a;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,86,166,0.3);
  }
  
  .auth-btn:last-child:hover {
    background: #5a6268;
    transform: translateY(-2px);
  }
  
  textarea {
    resize: vertical;
    min-height: 80px;
  }
</style>
{% endblock %}
